services:
  db:
    image: postgres:16-alpine
    container_name: student-counseling-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: student_counseling_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d student_counseling_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: student-counseling-api
    environment:
      APP_NAME: "Student Counseling API"
      APP_ENV: "development"
      APP_VERSION: "0.1.0"
      DATABASE_URL: "postgresql+psycopg2://postgres:postgres@db:5432/student_counseling_db"
      JWT_SECRET_KEY: "docker-development-secret-key"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data: