name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: student_counseling_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d student_counseling_test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_NAME: "Student Counseling API"
      APP_ENV: "test"
      APP_VERSION: "0.1.0"
      DATABASE_URL: "postgresql+psycopg2://postgres:postgres@localhost:5432/student_counseling_test_db"
      TEST_DATABASE_URL: "postgresql+psycopg2://postgres:postgres@localhost:5432/student_counseling_test_db"
      JWT_SECRET_KEY: "github-actions-test-secret-key"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest